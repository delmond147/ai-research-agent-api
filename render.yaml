services:
  - type: web
    name: research-agent-api
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
